<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeHE Deduction Reconciliation · Swoffle</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Calibri', 'Candara', 'Segoe UI', 'Optima', Arial, sans-serif;
  background: #fff;
  color: #1a1a2e;
  font-size: 13px;
  line-height: 1.5;
}

/* ── PAGE HEADER ── */
.page-header {
  background: #fff;
  border-bottom: 2px solid #e8eaed;
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}
.page-header-left { display: flex; align-items: center; gap: 14px; }
.brand { font-size: 18px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.02em; }
.page-title { font-size: 13px; font-weight: 500; color: #6b7280; }
.page-header-right { display: flex; align-items: center; gap: 16px; }
.record-count { font-family: 'Calibri', sans-serif; font-size: 12px; font-weight: 500; color: #374151; background: #f3f4f6; border: 1px solid #e5e7eb; padding: 4px 10px; border-radius: 6px; }
.header-date { font-size: 12px; color: #9ca3af; }

/* ── SUMMARY CARDS ── */
.cards-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding: 20px 28px;
  border-bottom: 1px solid #e8eaed;
  background: #fafafa;
}
.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 16px 18px;
}
.card-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; margin-bottom: 6px; }
.card-val { font-family: 'Calibri', sans-serif; font-size: 22px; font-weight: 500; }
.card-val.green { color: #059669; }
.card-val.red { color: #dc2626; }
.card-val.orange { color: #d97706; }
.card-val.blue { color: #2563eb; }
.card-sub { font-size: 11px; color: #9ca3af; margin-top: 3px; }

/* ── QUICK FILTER BAR ── */
.filter-bar {
  padding: 14px 28px;
  border-bottom: 1px solid #e8eaed;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  background: #fff;
}
.filter-bar-label { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.07em; }
.pill-btn {
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1.5px solid #e5e7eb; background: #fff; color: #6b7280;
  cursor: pointer; transition: all 0.12s; white-space: nowrap;
}
.pill-btn:hover { border-color: #9ca3af; color: #374151; }
.pill-btn.active-all { border-color: #1a1a2e; background: #1a1a2e; color: #fff; }
.pill-btn.pill-credit  { border-color: #bfdbfe; background: #eff6ff; color: #2563eb; }
.pill-btn.pill-cleared { border-color: #a7f3d0; background: #ecfdf5; color: #059669; }
.pill-btn.pill-inprog  { border-color: #fcd34d; background: #fffbeb; color: #d97706; }
.pill-btn.pill-dispute { border-color: #ddd6fe; background: #f5f3ff; color: #7c3aed; }
.pill-btn.pill-reversal { border-color: #93c5fd; background: #f0f9ff; color: #0369a1; }

.pill-btn.active-credit  { border-color: #2563eb; background: #2563eb; color: #fff; }
.pill-btn.active-cleared { border-color: #059669; background: #059669; color: #fff; }
.pill-btn.active-inprog  { border-color: #d97706; background: #d97706; color: #fff; }
.pill-btn.active-dispute { border-color: #7c3aed; background: #7c3aed; color: #fff; }
.pill-btn.active-reversal { border-color: #0369a1; background: #0369a1; color: #fff; }

.reset-btn {
  padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
  border: 1px solid #e5e7eb; background: #fff; color: #9ca3af;
  cursor: pointer; transition: all 0.12s; margin-left: auto;
}
.reset-btn:hover { border-color: #d1d5db; color: #6b7280; }
.visible-label { font-family: 'Calibri', sans-serif; font-size: 11px; color: #9ca3af; white-space: nowrap; }
.visible-label b { color: #374151; }

/* ── TABLE CONTAINER ── */
.table-wrap {
  padding: 0 28px 40px;
  overflow-x: auto;
}
.table-inner { min-width: 1300px; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}

thead tr.col-headers th {
  background: #fff;
  padding: 10px 10px 6px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: #374151;
  letter-spacing: 0.03em;
  border-bottom: 1px solid #e5e7eb;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
thead tr.col-headers th:hover { color: #111; }
thead tr.col-headers th.active { color: #2563eb; }
thead tr.col-headers th.r { text-align: right; }
.th-inner { display: inline-flex; align-items: center; gap: 4px; }
.sort-arrow { font-size: 9px; color: #9ca3af; }
thead tr.col-headers th.active .sort-arrow { color: #2563eb; }

thead tr.col-filters th {
  background: #f9fafb;
  padding: 4px 6px 6px;
  border-bottom: 2px solid #e5e7eb;
}
.col-filter-input {
  width: 100%;
  padding: 4px 8px;
  border: 1px solid #e5e7eb;
  border-radius: 5px;
  font-family: 'Calibri', sans-serif;
  font-size: 11.5px;
  color: #374151;
  background: #fff;
  outline: none;
  transition: border-color 0.12s;
}
.col-filter-input:focus { border-color: #6b7280; }
.col-filter-input::placeholder { color: #d1d5db; font-size: 11px; }

tbody tr {
  border-bottom: 1px solid #f3f4f6;
  transition: background 0.08s;
}
tbody tr:hover { background: #f9fafb; }
tbody tr.row-dispute { background: #f0fdf4; }
tbody tr.row-dispute:hover { background: #dcfce7; }

td {
  padding: 9px 10px;
  vertical-align: top;
  color: #374151;
}
td.r { text-align: right; }
td.mid { vertical-align: middle; }

.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge-cleared { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
.badge-inprog { background: #fffbeb; color: #d97706; border: 1px solid #fcd34d; }
.badge-credit { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
.badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.badge-cleared .badge-dot { background: #059669; }
.badge-inprog .badge-dot { background: #d97706; }
.badge-credit .badge-dot { background: #2563eb; }

@media (max-width: 900px) {
  .cards-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-left">
    <span class="brand">Swoffle</span>
    <span class="page-title">KeHE Deduction Reconciliation Worksheet</span>
  </div>
  <div class="page-header-right">
    <span class="record-count" id="recCount">Loading...</span>
    <span class="header-date" id="hdrDate"></span>
  </div>
</div>

<div class="cards-row">
  <div class="card">
    <div class="card-label">Credits &amp; Payments</div>
    <div class="card-val green" id="sCredits">—</div>
    <div class="card-sub" id="sCreditsN">—</div>
  </div>
  <div class="card">
    <div class="card-label">Deductions &amp; Chargebacks</div>
    <div class="card-val red" id="sDebits">—</div>
    <div class="card-sub" id="sDebitsN">—</div>
  </div>
  <div class="card">
    <div class="card-label">Disputes In Progress</div>
    <div class="card-val orange" id="sDisp">—</div>
    <div class="card-sub" id="sDispN">—</div>
  </div>
  <div class="card">
    <div class="card-label">Net Balance (Visible)</div>
    <div class="card-val blue" id="sNet">—</div>
    <div class="card-sub" id="sNetN">—</div>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-bar-label">Status</span>
  <button class="pill-btn active-all" data-s="all">All</button>
  <button class="pill-btn pill-reversal" data-s="reversal">Deduction Reversal</button>
  <button class="pill-btn pill-credit" data-s="credit">Payment / Credit</button>
  <button class="pill-btn pill-cleared" data-s="P - Paid">Deduction Cleared</button>
  <button class="pill-btn pill-inprog" data-s="A - In progress">In Progress</button>
  <button class="pill-btn pill-dispute" data-s="dispute">Dispute Only</button>
  <button class="reset-btn" id="resetBtn">↺ Reset All Filters</button>
  <span class="visible-label">Showing <b id="visCount">0</b> visible</span>
</div>

<div class="table-wrap">
  <div class="table-inner">
    <table id="mainTable">
      <thead>
        <tr class="col-headers">
          <th onclick="doSort('invoice')">Invoice #</th>
          <th onclick="doSort('date')">Date</th>
          <th onclick="doSort('remarks')">Remarks</th>
          <th onclick="doSort('po')">PO #</th>
          <th onclick="doSort('dc')">DC</th>
          <th onclick="doSort('amt')" class="r">Invoice Amt</th>
          <th>Status</th>
          <th class="r">Dispute $</th>
          <th>Check #</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="tBody"></tbody>
    </table>
  </div>
</div>

<script>
const DATA = [
{"invoice":"CS003578967","date":"2026-01-26","remarks":"336642","po":"","amt":-4.95,"status":"P - Paid","dc":"NORTH EAST, MD","check_num":"3261693","notes":"Spoils Allowance"},
{"invoice":"8077IA","date":"2026-02-19","remarks":"8077IA","po":"3510218","amt":774.46,"status":"P - Paid","dc":"NORTH EAST, MD","check_num":"3261693","is_reversal":true,"notes":"Deduction Reversal Credit"},
{"invoice":"8126IA","date":"2026-03-05","remarks":"8126IA","po":"3548578","amt":387.24,"status":"P - Paid","dc":"NORTH EAST, MD","check_num":"3261693","notes":"Deduction cleared credit amount adjusted"},
{"invoice":"LF32515","date":"2026-01-28","remarks":"LDF2025Q4","po":"","amt":250,"status":"A - In progress","dc":"BREINIGSVILLE, PA","check_num":"3261693","is_reversal":true,"dispute":250,"notes":"Deduction Reversal - In Progress"},
{"invoice":"407753","date":"2026-02-01","remarks":"MCBB","po":"","amt":-98.25,"status":"P - Paid","dc":"NORTH EAST, MD","check_num":"3261693","notes":"Fee excessive"}
];

let sortKey = 'date', sortDir = 'asc', statusFilter = 'all';

function render() {
  const rows = DATA.filter(r => {
    if (statusFilter === 'all') return true;
    if (statusFilter === 'reversal') return r.is_reversal === true;
    if (statusFilter === 'credit') return r.amt > 0 && !r.is_reversal;
    if (statusFilter === 'P - Paid') return r.status === 'P - Paid';
    if (statusFilter === 'A - In progress') return r.status === 'A - In progress';
    if (statusFilter === 'dispute') return r.dispute > 0;
    return true;
  });

  document.getElementById('visCount').textContent = rows.length;
  document.getElementById('recCount').textContent = rows.length + ' of ' + DATA.length + ' records';

  const tbody = document.getElementById('tBody');
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${r.invoice}</td>
      <td>${r.date}</td>
      <td>${r.remarks}</td>
      <td>${r.po || '—'}</td>
      <td>${r.dc}</td>
      <td class="r">${r.amt < 0 ? '-$' : '$'}${Math.abs(r.amt).toFixed(2)}</td>
      <td><span class="badge ${r.status === 'P - Paid' ? 'badge-cleared' : 'badge-inprog'}"><span class="badge-dot"></span>${r.status === 'P - Paid' ? 'Cleared' : 'In Progress'}</span></td>
      <td class="r">${r.dispute ? '$'+r.dispute.toFixed(2) : '—'}</td>
      <td>${r.check_num}</td>
      <td>${r.notes}</td>
    </tr>
  `).join('');
}

document.querySelectorAll('[data-s]').forEach(btn => {
  btn.addEventListener('click', () => {
    statusFilter = btn.dataset.s;
    document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active-all', 'active-reversal', 'active-credit', 'active-cleared', 'active-inprog', 'active-dispute'));
    btn.classList.add('active-' + btn.dataset.s.replace('P - Paid', 'cleared').replace('A - In progress', 'inprog'));
    render();
  });
});

document.getElementById('hdrDate').textContent = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
render();
</script>
</body>
</html>
