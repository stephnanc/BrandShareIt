const displayCols = ["Invoice #", "Date", "Remarks", "PO #", "Invoice Amt", "Status", "DC Name", "Check #", "Check Amt", "Deduction Dispute Credit Back In Progress", "Backup Links", "Notes"];

function init() {
    const hRow = document.getElementById('hRow');
    const fRow = document.getElementById('filterRow');
    if (!hRow || !fRow) return;
    
    displayCols.forEach(c => {
        const th = document.createElement('th');
        th.innerText = c;
        if (c === 'Notes') th.className = 'col-notes';
        hRow.appendChild(th);

        const fth = document.createElement('th');
        if (c !== 'Backup Links') {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'col-filter';
            input.placeholder = 'Filter...';
            input.dataset.col = c;
            input.addEventListener('input', filterTable);
            fth.appendChild(input);
        }
        fRow.appendChild(fth);
    });

    render(rawData);
    document.getElementById('globalSearch').addEventListener('input', filterTable);
}

function filterTable() {
    const globalQ = document.getElementById('globalSearch').value.toLowerCase();
    const colFilters = Array.from(document.querySelectorAll('.col-filter')).map(input => ({
        col: input.dataset.col,
        val: input.value.toLowerCase()
    })).filter(f => f.val);

    const filtered = rawData.filter(r => {
        const matchesGlobal = !globalQ || Object.values(r).some(v => String(v).toLowerCase().includes(globalQ));
        const matchesCols = colFilters.every(f => {
            const cellVal = String(r[f.col] || '').toLowerCase();
            return cellVal.includes(f.val);
        });
        return matchesGlobal && matchesCols;
    });

    render(filtered);
}

function render(fData) {
    const body = document.getElementById('bRow');
    if (!body) return;
    body.innerHTML = '';
    let credits = 0, deductions = 0, disputed = 0;

    fData.forEach(r => {
        const tr = document.createElement('tr');
        
        // Manual currency cleaning
        const invAmtStr = String(r['Invoice Amt'] || '0').replace(/[$,()]/g, '');
        const invAmt = parseFloat(invAmtStr) || 0;
        
        const dispAmtStr = String(r['Deduction Dispute Credit Back In Progress'] || '0').replace(/[$,()]/g, '');
        const dispAmt = parseFloat(dispAmtStr) || 0;
        
        // SUMMARY MATH LOGIC
        // Exclude the sum-of-POs line (8126) from the summary cards to avoid the $1,161.70 overage
        if (r['Invoice #'] !== '8126') {
            if (invAmt > 0) credits += invAmt; else deductions += invAmt;
        }
        disputed += dispAmt;

        displayCols.forEach(k => {
            const td = document.createElement('td');
            if (k === 'Backup Links') {
                const link = r['Long Link'];
                const remark = r['Remarks'];
                if (link && String(link).startsWith('http')) {
                    td.innerHTML = `<a href="${link}" target="_blank" class="link-btn">Backup ${remark}</a>`;
                }
            } else if (k === 'Notes') {
                td.className = 'col-notes';
                td.innerText = r['Notes'] || '';
            } else {
                td.innerText = r[k] || '';
                if (k === 'Deduction Dispute Credit Back In Progress') td.className = 'dispute-cell';
            }
            
            if (k.includes('Amt')) {
                const cleanVal = String(r[k] || '0').replace(/[$,()]/g, '');
                const v = parseFloat(cleanVal);
                if (v < 0) td.classList.add('neg'); else if (v > 0) td.classList.add('pos');
            }
            tr.appendChild(td);
        });
        body.appendChild(tr);
    });

    const fmt = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(Math.abs(v));
    document.getElementById('stat-total').innerText = fData.length;
    document.getElementById('stat-credits').innerText = fmt(credits);
    document.getElementById('stat-deductions').innerText = "(" + fmt(deductions) + ")";
    document.getElementById('stat-disputed').innerText = fmt(disputed);
    document.getElementById('stat-visible').innerText = fData.length;
}

window.onload = init;
