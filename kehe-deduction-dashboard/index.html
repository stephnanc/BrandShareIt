const displayCols = ["Invoice #", "Date", "Remarks", "PO #", "Invoice Amt", "Status", "DC Name", "Check #", "Check Amt", "Deduction Dispute Credit Back In Progress", "Backup Links", "Notes"];

function init() {
    const hRow = document.getElementById('hRow');
    displayCols.forEach(c => {
        const th = document.createElement('th');
        th.innerHTML = `<div>${c}</div><input type="text" placeholder="Filter..." class="filter-input" data-col="${c}">`;
        if (c === 'Notes') th.className = 'col-notes';
        hRow.appendChild(th);
    });

    render(rawData);
    document.getElementById('globalSearch').addEventListener('input', runFilters);
    document.querySelectorAll('.filter-input').forEach(i => i.addEventListener('input', runFilters));
}

function runFilters() {
    const gQ = document.getElementById('globalSearch').value.toLowerCase();
    const filters = Array.from(document.querySelectorAll('.filter-input')).map(i => ({col: i.dataset.col, val: i.value.toLowerCase()}));

    const filtered = rawData.filter(r => {
        const matchG = Object.values(r).some(v => String(v).toLowerCase().includes(gQ));
        const matchC = filters.every(f => {
            if (!f.val || f.col === "Backup Links") return true;
            return String(r[f.col] || '').toLowerCase().includes(f.val);
        });
        return matchG && matchC;
    });
    render(filtered);
}

function render(fData) {
    const body = document.getElementById('bRow');
    body.innerHTML = '';
    let credits = 0, deductions = 0, disputed = 0;

    fData.forEach(r => {
        const tr = document.createElement('tr');
        const invAmt = parseFloat(String(r['Invoice Amt']).replace(/[$,()]/g, '')) || 0;
        const dispAmt = parseFloat(String(r['Deduction Dispute Credit Back In Progress']).replace(/[$,()]/g, '')) || 0;
        
        // Exclude the subtotal/duplicate item from the math
        if (r['Invoice #'] !== '8126') {
            if (invAmt > 0) credits += invAmt; else deductions += invAmt;
        }
        disputed += dispAmt;

        displayCols.forEach(k => {
            const td = document.createElement('td');
            if (k === 'Backup Links') {
                const link = r['Long Link'];
                const remark = r['Remarks'];
                if (link && String(link).startsWith('http')) {
                    td.innerHTML = `<a href="${link}" target="_blank" class="link-btn">Backup ${remark}</a>`;
                }
            } else if (k === 'Notes') {
                td.className = 'col-notes';
                td.innerText = r[k] || '';
            } else {
                td.innerText = r[k] || '';
                if (k === 'Deduction Dispute Credit Back In Progress') td.className = 'dispute-cell';
            }
            
            if (k.includes('Amt') || k === 'Invoice Amt') {
                const val = parseFloat(String(r[k]).replace(/[$,()]/g, '')) || 0;
                if (val < 0) td.classList.add('neg'); else if (val > 0) td.classList.add('pos');
            }
            tr.appendChild(td);
        });
        body.appendChild(tr);
    });

    const fmt = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(Math.abs(v));
    document.getElementById('stat-total').innerText = fData.length;
    document.getElementById('stat-credits').innerText = fmt(credits);
    document.getElementById('stat-deductions').innerText = "(" + fmt(deductions) + ")";
    document.getElementById('stat-disputed').innerText = fmt(disputed);
    document.getElementById('stat-visible').innerText = fData.length;
}

window.onload = init;
