function render(fData) {
    const body = document.getElementById('bRow');
    body.innerHTML = '';
    let cred = 0, ded = 0, disp = 0;

    fData.forEach(r => {
        const tr = document.createElement('tr');
        const a = parseFloat(r.amt) || 0;
        const d = parseFloat(r.ds) || 0;
        
        if (a > 0) cred += a; else ded += a;
        disp += d;

        const linkHtml = r.lnk ? `<a href="${r.lnk}" target="_blank" class="link-btn">View Backup</a>` : '';

        tr.innerHTML = `
            <td>${r.inv}</td>
            <td>${r.dt}</td>
            <td>${r.rem}</td>
            <td>${r.po}</td>
            <td class="${a > 0 ? 'pos' : 'neg'}">$${Math.abs(a).toFixed(2)}</td>
            <td>${r.st}</td>
            <td>${r.dc}</td>
            <td>${r.ch}</td>
            <td class="dispute-cell">${d > 0 ? '$' + d.toFixed(2) : ''}</td>
            <td>${linkHtml}</td>
            <td class="col-notes">${r.nt}</td>
        `;
        body.appendChild(tr);
    });

    const fmt = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(Math.abs(n));

    document.getElementById('stat-deductions').innerText = "(" + fmt(ded) + ")";
    document.getElementById('stat-disputed').innerText = fmt(disp);
    document.getElementById('stat-visible').innerText = fData.length;
}
