<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEHE Remittance Deduction Worksheet</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 100%;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        header {
            border-bottom: 3px solid #004a99;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-titles h1 { color: #004a99; margin: 0; font-size: 28px; }
        .header-titles p { margin: 5px 0 0 0; color: #666; font-weight: 500; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-box {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-box:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .stat-box label { display: block; font-size: 11px; color: #888; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .stat-box span { font-size: 20px; font-weight: 700; color: #004a99; }

        .search-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)) 150px;
            gap: 15px;
            margin-bottom: 25px;
            background: #f1f4f8;
            padding: 20px;
            border-radius: 10px;
            align-items: flex-end;
        }
        .control-group label { display: block; font-size: 12px; margin-bottom: 8px; font-weight: 600; color: #444; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 13px;
        }
        input:focus { outline: none; border-color: #004a99; box-shadow: 0 0 0 2px rgba(0,74,153,0.1); }
        
        .export-btn {
            background-color: #218838;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            height: 40px;
            transition: background 0.2s;
        }
        .export-btn:hover { background-color: #1e7e34; }

        .table-wrap {
            overflow-x: auto;
            max-height: 650px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background-color: #004a99;
            color: white;
            position: sticky;
            top: 0;
            padding: 14px 10px;
            text-align: left;
            white-space: nowrap;
            z-index: 10;
        }
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
            white-space: nowrap;
        }
        .notes-cell { min-width: 200px; font-style: italic; color: #666; }
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f7ff; }
        .neg-amt { color: #d93025; font-weight: 600; }
        .pos-amt { color: #188038; font-weight: 600; }
    </style>
</head>

    </div>
</div>

function init() {
    const head = document.getElementById('tableHead');
    // Identify keys to show (excluding helper cleaning column)
    const cols = Object.keys(data[0]).filter(k => k !== 'Invoice Amt Clean');
    
    cols.forEach(col => {
        const th = document.createElement('th');
        th.innerText = col;
        head.appendChild(th);
    });

    updateDisplay(data);

    document.getElementById('searchAll').addEventListener('input', filterData);
    document.getElementById('searchCheck').addEventListener('input', filterData);
    document.getElementById('searchType').addEventListener('change', filterData);
}

function formatCurrency(val) {
    const absVal = Math.abs(val);
    const formatted = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(absVal);
    return val < 0 ? `(${formatted})` : formatted;
}

function updateDisplay(filteredData) {
    const body = document.getElementById('tableBody');
    body.innerHTML = '';
    
    let totalLineItems = filteredData.length;
    let credits = 0;
    let deductions = 0;
    let discounts = 0;

    filteredData.forEach(row => {
        const tr = document.createElement('tr');
        const amt = row['Invoice Amt Clean'];
        
        if (amt > 0) credits += amt;
        else if (amt < 0) {
            deductions += amt;
            // Keywords often associated with discounts/promos in KEHE remarks
            const rem = String(row['Remarks']).toLowerCase();
            if (rem.includes('disc') || rem.includes('promo') || rem.includes('off invoice')) {
                discounts += amt;
            }
        }

        Object.keys(row).forEach(key => {
            if (key === 'Invoice Amt Clean') return;
            const td = document.createElement('td');
            let val = row[key];
            
            if (key === 'Notes-Backup Links') {
                td.className = 'notes-cell';
                td.contentEditable = "true"; // Allow user to type notes in the browser session
                td.innerText = val || "Click to add note...";
            } else {
                td.innerText = val === null ? '' : val;
            }
            
            // Highlight Currency
            if (key === 'Invoice Amt' || key === 'Check Amt') {
                const cleanVal = parseFloat(String(val).replace(/[^\d.-]/g, ''));
                if (!isNaN(cleanVal)) {
                    td.className = cleanVal < 0 ? 'neg-amt' : 'pos-amt';
                }
            }
            
            tr.appendChild(td);
        });
        body.appendChild(tr);
    });

    document.getElementById('stat-total').innerText = totalLineItems;
    document.getElementById('stat-credits').innerText = formatCurrency(credits);
    document.getElementById('stat-deductions').innerText = formatCurrency(deductions);
    document.getElementById('stat-discounts').innerText = formatCurrency(discounts);
    document.getElementById('stat-visible').innerText = filteredData.length;
}

function filterData() {
    const allQuery = document.getElementById('searchAll').value.toLowerCase();
    const checkQuery = document.getElementById('searchCheck').value.toLowerCase();
    const typeQuery = document.getElementById('searchType').value;

    const filtered = data.filter(row => {
        const textMatch = Object.values(row).some(v => String(v).toLowerCase().includes(allQuery));
        const checkMatch = String(row['Check #']).toLowerCase().includes(checkQuery);
        const typeMatch = typeQuery === "" || String(row['Status']).includes(typeQuery);
        return textMatch && checkMatch && typeMatch;
    });

    updateDisplay(filtered);
}

function exportToCSV() {
    const allQuery = document.getElementById('searchAll').value.toLowerCase();
    const checkQuery = document.getElementById('searchCheck').value.toLowerCase();
    const typeQuery = document.getElementById('searchType').value;

    const filtered = data.filter(row => {
        const textMatch = Object.values(row).some(v => String(v).toLowerCase().includes(allQuery));
        const checkMatch = String(row['Check #']).toLowerCase().includes(checkQuery);
        const typeMatch = typeQuery === "" || String(row['Status']).includes(typeQuery);
        return textMatch && checkMatch && typeMatch;
    });

    if (filtered.length === 0) return;

    const headers = Object.keys(filtered[0]).filter(k => k !== 'Invoice Amt Clean');
    const rows = filtered.map(row => headers.map(h => `"${row[h] || ''}"`).join(','));
    const csvContent = "data:text/csv;charset=utf-8," + headers.join(',') + "\n" + rows.join('\n');
    
    const link = document.createElement("a");
    link.setAttribute("href", encodeURI(csvContent));
    link.setAttribute("download", "KEHE_Remittance_Worksheet_Export.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

init();
