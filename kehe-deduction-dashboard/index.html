function render(fData) {
    const body = document.getElementById('bRow');
    body.innerHTML = '';
    let cred = 0, ded = 0, disp = 0;

    fData.forEach(r => {
        const tr = document.createElement('tr');
        if (r.amt > 0) cred += r.amt; else ded += r.amt;
        disp += r.ds;

        tr.innerHTML = `<td>${r.inv}</td><td>${r.dt}</td><td>${r.rem}</td><td>${r.po}</td><td class="${r.amt > 0 ? 'pos' : 'neg'}">$${Math.abs(r.amt).toFixed(2)}</td><td>${r.st}</td><td>${r.dc}</td><td>${r.nt}</td>`;
        body.appendChild(tr);
    });

    const f = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(Math.abs(n));
    document.getElementById('stat-total').innerText = rawData.length;
    document.getElementById('stat-credits').innerText = f(cred);
    document.getElementById('stat-deductions').innerText = "(" + f(ded) + ")";
    document.getElementById('stat-disputed').innerText = f(disp);
    document.getElementById('stat-visible').innerText = fData.length;
}

window.onload = () => {
    render(rawData);
    document.getElementById('globalSearch').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        render(rawData.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q))));
    });
};
