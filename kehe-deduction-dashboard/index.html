<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEHE Remittance Deduction Worksheet</title>
    <style>
        body { font-family: 'Calibri', 'Segoe UI', sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; color: #000; }
        .container { max-width: 100%; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        header { border-bottom: 4px solid #004a99; padding-bottom: 15px; margin-bottom: 25px; }
        h1 { color: #004a99; margin: 0; font-size: 26px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #e0e0e0; text-align: center; border-top: 4px solid #004a99; }
        .stat-box label { display: block; font-size: 10px; color: #888; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .stat-box span { font-size: 18px; font-weight: 700; color: #333; }
        .search-controls { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
        .table-wrap { overflow-x: auto; max-height: 650px; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #004a99; color: white; position: sticky; top: 0; padding: 12px 10px; text-align: left; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #eee; white-space: nowrap; }
        tr:hover { background-color: #f1f7ff; }
        .neg { color: #d93025; font-weight: bold; }
        .pos { color: #188038; font-weight: bold; }
        .dispute-cell { background-color: #fff9eb; font-weight: bold; color: #a67c00; }
        .link-btn { color: #004a99; font-weight: bold; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>KEHE, KEHE Distributors</h1>
        <div style="color: #666; font-weight: bold;">Vendor: 23017256 | Created by Stephen Nance</div>
    </header>

    <div class="stats-grid">
        <div class="stat-box"><label>Total Line Items</label><span id="stat-total">0</span></div>
        <div class="stat-box"><label>Credits/Payments</label><span id="stat-credits">$0.00</span></div>
        <div class="stat-box"><label>Deductions/Chargebacks</label><span id="stat-deductions">$0.00</span></div>
        <div class="stat-box" style="border-top-color: #f39c12;"><label>Deductions in Dispute</label><span id="stat-disputed">$0.00</span></div>
        <div class="stat-box"><label>Visible Rows</label><span id="stat-visible">0</span></div>
    </div>

    <div class="search-controls">
        <input type="text" id="searchAll" placeholder="Search by Remark number, Invoice #, or Status...">
    </div>

    <div class="table-wrap">
        <table id="mainTable">
            <thead><tr id="hRow"></tr></thead>
            <tbody id="bRow"></tbody>
        </table>
    </div>
</div>

<script>
// THIS IS YOUR DATA PROCESSED FROM THE RECENT UPLOAD
const rawData = """ + data_json + """;

// Filter the columns we want to show
const displayCols = [
    "Invoice #", "Date", "Remarks", "PO #", "Invoice Amt", "Status", 
    "DC Name", "Check #", "Check Amt", "Deduction Dispute Credit Back In Progress", "Notes", "Backup Links"
];

function init() {
    const hRow = document.getElementById('hRow');
    displayCols.forEach(c => { 
        const th = document.createElement('th'); 
        th.innerText = c; 
        hRow.appendChild(th); 
    });
    render(rawData);

    document.getElementById('searchAll').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const filtered = rawData.filter(r => 
            Object.values(r).some(v => String(v).toLowerCase().includes(q))
        );
        render(filtered);
    });
}

function render(fData) {
    const body = document.getElementById('bRow');
    body.innerHTML = '';
    let credits = 0, deductions = 0, disputed = 0;

    fData.forEach(r => {
        const tr = document.createElement('tr');
        
        // Math logic for the summary boxes
        const invAmt = parseFloat(String(r['Invoice Amt']).replace(/[^0-9.-]/g, '')) || 0;
        const dispAmt = parseFloat(String(r['Deduction Dispute Credit Back In Progress']).replace(/[^0-9.-]/g, '')) || 0;
        
        if (invAmt > 0) credits += invAmt; else deductions += invAmt;
        disputed += dispAmt;

        displayCols.forEach(k => {
            const td = document.createElement('td');
            
            if (k === 'Backup Links') {
                const link = r['Long Link'];
                const remark = r['Remarks'];
                if (link && String(link).startsWith('http')) {
                    td.innerHTML = `<a href="${link}" target="_blank" class="link-btn">Backup ${remark}</a>`;
                } else {
                    td.innerText = "";
                }
            } else {
                td.innerText = r[k] || '';
                if (k === 'Deduction Dispute Credit Back In Progress') td.className = 'dispute-cell';
            }
            
            // Currency Styling
            if (k.includes('Amt')) {
                const v = parseFloat(String(r[k]).replace(/[^0-9.-]/g, ''));
                if (v < 0) td.classList.add('neg'); else if (v > 0) td.classList.add('pos');
            }
            
            tr.appendChild(td);
        });
        body.appendChild(tr);
    });

    const fmt = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(Math.abs(v));
    document.getElementById('stat-total').innerText = fData.length;
    document.getElementById('stat-credits').innerText = fmt(credits);
    document.getElementById('stat-deductions').innerText = "(" + fmt(deductions) + ")";
    document.getElementById('stat-disputed').innerText = fmt(disputed);
    document.getElementById('stat-visible').innerText = fData.length;
}

init();
</script>
</body>
</html>
