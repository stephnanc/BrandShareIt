const displayCols = ["Invoice #", "Date", "Remarks", "PO #", "Invoice Amt", "Status", "DC Name", "Check #", "Check Amt", "Deduction Dispute Credit Back In Progress", "Backup Links", "Notes"];

function init() {
    const hRow = document.getElementById('hRow');
    const fRow = document.getElementById('filterRow');
    
    displayCols.forEach(c => {
        const th = document.createElement('th');
        th.innerText = c;
        if (c === 'Notes') th.className = 'col-notes';
        hRow.appendChild(th);

        const fth = document.createElement('th');
        if (c !== 'Backup Links') {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'col-filter';
            input.placeholder = 'Filter...';
            input.dataset.col = c;
            input.addEventListener('input', applyFilters);
            fth.appendChild(input);
        }
        fRow.appendChild(fth);
    });

    render(rawData);
    document.getElementById('searchAll').addEventListener('input', applyFilters);
    document.getElementById('searchCheck').addEventListener('input', applyFilters);
    document.getElementById('searchType').addEventListener('change', applyFilters);
}

function applyFilters() {
    const globalVal = document.getElementById('searchAll').value.toLowerCase();
    const checkVal = document.getElementById('searchCheck').value.toLowerCase();
    const typeVal = document.getElementById('searchType').value;
    
    const colFilters = Array.from(document.querySelectorAll('.col-filter')).map(i => ({
        col: i.dataset.col,
        val: i.value.toLowerCase()
    })).filter(f => f.val);

    const filtered = rawData.filter(r => {
        const matchesGlobal = !globalVal || Object.values(r).some(v => String(v).toLowerCase().includes(globalVal));
        const matchesCheck = !checkVal || String(r['Check #'] || '').toLowerCase().includes(checkVal);
        const matchesType = !typeVal || String(r['Status'] || '').includes(typeVal);
        
        const matchesCols = colFilters.every(f => {
            return String(r[f.col] || '').toLowerCase().includes(f.val);
        });

        return matchesGlobal && matchesCheck && matchesType && matchesCols;
    });

    render(filtered);
}

function render(fData) {
    const body = document.getElementById('bRow');
    body.innerHTML = '';
    
    let totalItems = fData.length;
    let credits = 0;
    let deductions = 0;
    let discounts = 0;

    fData.forEach(r => {
        const tr = document.createElement('tr');
        
        const invAmt = parseFloat(String(r['Invoice Amt']).replace(/[^0-9.-]/g, '')) || 0;
        if (invAmt > 0) credits += invAmt;
        else if (invAmt < 0) {
            deductions += invAmt;
            const note = String(r['Notes'] || '').toLowerCase();
            const remark = String(r['Remarks'] || '').toLowerCase();
            if (note.includes('allowance') || note.includes('promo') || remark.includes('allow')) {
                discounts += invAmt;
            }
        }

        displayCols.forEach(k => {
            const td = document.createElement('td');
            if (k === 'Backup Links') {
                const link = r['Long Link'];
                const remark = r['Remarks'];
                if (link && String(link).startsWith('http')) {
                    td.innerHTML = `<a href="${link}" target="_blank" class="link-btn">Backup ${remark}</a>`;
                }
            } else if (k === 'Notes') {
                td.className = 'col-notes';
                td.innerText = r[k] || '';
            } else {
                td.innerText = r[k] || '';
                if (k === 'Deduction Dispute Credit Back In Progress') td.className = 'dispute-cell';
            }
            
            if (k.includes('Amt')) {
                const v = parseFloat(String(r[k]).replace(/[^0-9.-]/g, ''));
                if (v < 0) td.classList.add('neg'); else if (v > 0) td.classList.add('pos');
            }
            tr.appendChild(td);
        });
        body.appendChild(tr);
    });

    const fmt = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(Math.abs(v));
    document.getElementById('stat-total').innerText = totalItems;
    document.getElementById('stat-credits').innerText = fmt(credits);
    document.getElementById('stat-deductions').innerText = "(" + fmt(deductions) + ")";
    document.getElementById('stat-discounts').innerText = "(" + fmt(discounts) + ")";
    document.getElementById('stat-visible').innerText = fData.length;
}

function exportCSV() {
    // Simplified export for the current view
    const table = document.getElementById('mainTable');
    let csv = [];
    const rows = table.querySelectorAll('tr');
    
    for (let i = 0; i < rows.length; i++) {
        if (rows[i].classList.contains('filter-row')) continue;
        const row = [], cols = rows[i].querySelectorAll('td, th');
        for (let j = 0; j < cols.length; j++) 
            row.push('"' + cols[j].innerText.replace(/"/g, '""') + '"');
        csv.push(row.join(','));
    }

    const csvFile = new Blob([csv.join('\n')], { type: 'text/csv' });
    const downloadLink = document.createElement('a');
    downloadLink.download = 'KEHE_Remittance_Export.csv';
    downloadLink.href = window.URL.createObjectURL(csvFile);
    downloadLink.style.display = 'none';
    document.body.appendChild(downloadLink);
    downloadLink.click();
}

window.onload = init;
