// Filter out helper columns and the long link column to keep the table clean
const displayCols = Object.keys(data[0]).filter(k => !['Invoice Amt Clean', 'Deduction Amt Clean', 'Long Link', 'Short Link Creation - Back Up'].includes(k));

function init() {
    const hRow = document.getElementById('hRow');
    displayCols.forEach(c => { 
        const th = document.createElement('th'); 
        th.innerText = (c === 'Notes-Backup Links') ? 'Backup Links' : c; 
        hRow.appendChild(th); 
    });
    render(data);
    document.getElementById('searchAll').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const filtered = data.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
        render(filtered);
    });
}

function render(fData) {
    const body = document.getElementById('bRow');
    body.innerHTML = '';
    let credits = 0, deductions = 0, disputed = 0;

    fData.forEach(r => {
        const tr = document.createElement('tr');
        credits += (r['Invoice Amt Clean'] > 0 ? r['Invoice Amt Clean'] : 0);
        deductions += (r['Invoice Amt Clean'] < 0 ? r['Invoice Amt Clean'] : 0);
        disputed += r['Deduction Amt Clean'];

        displayCols.forEach(k => {
            const td = document.createElement('td');
            if (k === 'Notes-Backup Links') {
                td.innerHTML = r[k] || ''; // This inserts the clickable <a> tag
            } else if (k === 'Deduction Dispute Credit Back In Progress') {
                td.innerText = r[k] || '';
                td.className = 'dispute-cell';
            } else {
                td.innerText = r[k] || '';
            }
            
            if (k.includes('Amt')) {
                const v = parseFloat(String(r[k]).replace(/[^\d.-]/g, ''));
                if (v < 0) td.classList.add('neg'); else if (v > 0) td.classList.add('pos');
            }
            tr.appendChild(td);
        });
        body.appendChild(tr);
    });

    const fmt = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(v);
    document.getElementById('stat-total').innerText = fData.length;
    document.getElementById('stat-credits').innerText = fmt(credits);
    document.getElementById('stat-deductions').innerText = fmt(deductions);
    document.getElementById('stat-disputed').innerText = fmt(disputed);
    document.getElementById('stat-visible').innerText = fData.length;
}

init();
</script>
